<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Tutorial - {{ current_topic.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

    <style>
        /* ===== TOKENS ===== */
        :root {
            --yellow:     #FCC206;
            --yellow-dk:  #e6a800;
            --yellow-bg:  #FFF8DC;
            --yellow-bdr: rgba(252,194,6,0.35);
            --white:      #FFFFFF;
            --bg:         #F5F6FA;
            --text:       #1A1A2E;
            --text-sm:    #6B7280;
            --border:     #E5E7EB;
            --radius:     14px;
            --nav-h:      68px;
            --sidebar-w:  280px;
        }

        /* ===== RESET ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; height: 100%; }
        body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--text); line-height: 1.6; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        a { text-decoration: none; color: inherit; }

        /* ===== NAVBAR ===== */
        .navbar {
            flex-shrink: 0;
            height: var(--nav-h);
            background: #fff;
            border-bottom: 3px solid var(--yellow);
            display: flex; align-items: center; padding: 0 24px;
            z-index: 100;
        }
        .nav-inner { width: 100%; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.2rem; color: var(--text); }
        .nav-logo .icon { width: 38px; height: 38px; background: var(--yellow); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #111; font-size: 1rem; }
        .nav-logo .accent { color: var(--yellow-dk); }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-link { font-weight: 600; color: var(--text); font-size: 0.95rem; transition: color 0.2s; }
        .nav-link:hover { color: var(--yellow-dk); }

        /* ===== LAYOUT ===== */
        .layout { display: flex; flex: 1; overflow: hidden; }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--bg);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 20px 0;
            flex-shrink: 0;
        }
        .sidebar-title {
            padding: 0 20px 10px; font-size: 1rem; font-weight: 800; color: var(--text);
            border-bottom: 1px solid var(--border); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .topic-link {
            display: block;
            padding: 10px 20px;
            color: var(--text);
            font-size: 0.95rem;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        .topic-link:hover { background: rgba(252,194,6,0.1); }
        .topic-link.active {
            background: rgba(252,194,6,0.2);
            font-weight: 700;
            border-left-color: var(--yellow);
            color: var(--yellow-dk);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background: var(--white);
        }
        .content-container { max-width: 800px; margin: 0 auto; }
        
        .topic-header { margin-bottom: 30px; }
        .topic-header h1 { font-size: 2.2rem; font-weight: 800; color: var(--text); }
        .divider { width: 60px; height: 4px; background: var(--yellow); border-radius: 4px; margin-top: 12px; }

        /* Code example block */
        .example-box {
            background: #F8F9FA;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .example-header {
            background: var(--bg);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 700; font-size: 0.95rem;
            display: flex; align-items: center; gap: 8px;
        }
        .example-header i { color: var(--yellow-dk); }
        
        .example-body pre {
            margin: 0; padding: 20px;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 1rem; line-height: 1.5;
            background: #282C34 !important; /* Overriding for dark mode code block */
        }
        
        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .nav-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--text); color: #fff;
            padding: 12px 24px; border-radius: 8px;
            font-weight: 600; font-size: 0.95rem;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: var(--yellow); color: #111; transform: translateY(-2px); }
        .nav-btn.disabled { opacity: 0.5; pointer-events: none; }
        .nav-btn-next { background: var(--yellow); color: #111; }
        .nav-btn-next:hover { background: var(--yellow-dk); }

        /* Mobile Toggle */
        .mobile-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: var(--text); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .mobile-toggle { display: block; }
            .sidebar {
                position: fixed;
                top: var(--nav-h);
                left: -100%;
                height: calc(100vh - var(--nav-h));
                z-index: 50;
                transition: left 0.3s ease;
            }
            .sidebar.show { left: 0; }
            .main-content { padding: 20px; }
            .topic-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-inner">
            <div class="nav-logo">
                <i class="fa-solid fa-bars mobile-toggle" id="sidebarToggle"></i>
                <a href="/" style="display: flex; align-items: center; gap: 10px;">
                    <div class="icon"><i class="fa-brands fa-python"></i></div>
                    Doxpro Robotics<span class="accent">Tutorial</span>
                </a>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link"><i class="fa-solid fa-home"></i> Home</a>
            </div>
        </div>
    </nav>

    <!-- LAYOUT -->
    <div class="layout">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">Python Tutorial</div>
            {% for topic in topics %}
                <a href="/tutorial/{{ loop.index0 }}" class="topic-link {% if loop.index0 == topic_id %}active{% endif %}">
                    {{ topic.title }}
                </a>
            {% endfor %}
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div class="content-container">
                <div class="topic-header">
                    <h1>{{ current_topic.title }}</h1>
                    <div class="divider"></div>
                </div>

                <div class="example-box">
                    <div class="example-header">
                        <i class="fa-solid fa-code"></i> Example
                    </div>
                    <div class="example-body">
                        <pre><code class="language-python">{{ current_topic.code }}</code></pre>
                    </div>
                </div>

                <!-- Navigation Buttons -->
                <div class="nav-buttons">
                    {% if prev_id is not none %}
                        <a href="/tutorial/{{ prev_id }}" class="nav-btn"><i class="fa-solid fa-chevron-left"></i> Previous</a>
                    {% else %}
                        <div class="nav-btn disabled"><i class="fa-solid fa-chevron-left"></i> Previous</div>
                    {% endif %}

                    {% if next_id is not none %}
                        <a href="/tutorial/{{ next_id }}" class="nav-btn nav-btn-next">Next <i class="fa-solid fa-chevron-right"></i></a>
                    {% else %}
                        <div class="nav-btn disabled">Next <i class="fa-solid fa-chevron-right"></i></div>
                    {% endif %}
                </div>
            </div>
        </main>
    </div>

    <script>
        // Initialize highlight.js
        hljs.highlightAll();

        // Mobile sidebar toggle
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');

        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('show');
        });
    </script>
</body>
</html>
